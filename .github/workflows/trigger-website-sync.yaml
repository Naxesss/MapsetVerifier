name: Trigger website content sync

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger website content sync
        env:
          GH_TOKEN: ${{ secrets.MV_WEB_UPDATE_TOKEN }}
        run: |
          set -euo pipefail
          jq -n \
            --arg tag "${{ github.event.release.tag_name }}" \
            --argjson prerelease ${{ github.event.release.prerelease }} \
            --arg source_run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              event_type: "mapsetverifier-release",
              client_payload: {
                tag: $tag,
                prerelease: $prerelease,
                source_run_url: $source_run_url
              }
            }' | gh api repos/Hiviexd/mv-web/dispatches --input -
