name: Build

on:
  push:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Build .NET solution
        run: dotnet build MapsetVerifier.sln -c Release
      - name: Run .NET solution tests
        run: dotnet test MapsetVerifier.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  build-tauri:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_runtime: win-x64
            artifact_name: mapset-verifier-windows
            artifact_files: |
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe.sig
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_runtime: linux-x64
            artifact_name: mapset-verifier-linux
            artifact_files: |
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            sidecar_runtime: osx-x64
            artifact_name: mapset-verifier-macos-x64
            artifact_files: |
              tauri-app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              tauri-app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
              tauri-app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.dmg
          - runner: macos-15
            target: aarch64-apple-darwin
            sidecar_runtime: osx-arm64
            artifact_name: mapset-verifier-macos-arm64
            artifact_files: |
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.dmg
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build sidecar
        shell: bash
        run: |
          chmod +x build-sidecars.sh
          RUNTIMES="${{ matrix.sidecar_runtime }}" ./build-sidecars.sh

      - name: Install Tauri dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri-app
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

      - name: Upload native Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_files }}
          if-no-files-found: error
