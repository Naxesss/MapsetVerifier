name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  build-sidecar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build .NET solution
        run: dotnet build MapsetVerifier.sln -c Release

      - name: Restore tools
        run: dotnet tool restore

      - name: Run csharpier
        run: dotnet csharpier check .

      - name: Build sidecar (linux-x64)
        run: |
          chmod +x scripts/build-sidecars.sh
          RUNTIMES=linux-x64 ./scripts/build-sidecars.sh

      - name: Run .NET solution tests
        run: dotnet test MapsetVerifier.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            electron-app/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: electron-app
        run: npm ci

      - name: Run frontend lint
        working-directory: electron-app
        run: npm run lint

      - name: Verify root package
        run: npm run build
