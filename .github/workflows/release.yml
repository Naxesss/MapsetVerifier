name: Release Tauri app

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing git tag to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      release_name: ${{ steps.vars.outputs.release_name }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "A tag name is required to publish a release." >&2
            exit 1
          fi

          if [[ "$TAG_NAME" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=Mapset Verifier $TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.tag_name }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build .NET solution
        run: dotnet build MapsetVerifier.sln -c Release

      - name: Run .NET solution tests
        run: dotnet test MapsetVerifier.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

  build-tauri:
    needs: [resolve-release, build-and-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_runtime: win-x64
            platform_key: windows-x86_64
            updater_files: |
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe.sig
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_runtime: linux-x64
            platform_key: linux-x86_64
            updater_files: |
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          - runner: macos-13
            target: x86_64-apple-darwin
            sidecar_runtime: osx-x64
            platform_key: darwin-x86_64
            updater_files: |
              tauri-app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              tauri-app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - runner: macos-14
            target: aarch64-apple-darwin
            sidecar_runtime: osx-arm64
            platform_key: darwin-aarch64
            updater_files: |
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.tag_name }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build sidecar
        shell: bash
        run: |
          chmod +x build-sidecars.sh
          RUNTIMES="${{ matrix.sidecar_runtime }}" ./build-sidecars.sh

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri-app
          tagName: ${{ needs.resolve-release.outputs.tag_name }}
          releaseName: ${{ needs.resolve-release.outputs.release_name }}
          releaseDraft: true
          prerelease: ${{ needs.resolve-release.outputs.prerelease == 'true' }}
          includeUpdaterJson: false
          retryAttempts: 3
          args: --target ${{ matrix.target }}

      - name: Upload updater bundle inputs
        uses: actions/upload-artifact@v4
        with:
          name: updater-artifacts-${{ matrix.platform_key }}
          path: ${{ matrix.updater_files }}
          if-no-files-found: error

  publish-updater-metadata:
    needs: [resolve-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.tag_name }}

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-artifacts-*
          path: release-artifacts

      - name: Read draft release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release view "${{ needs.resolve-release.outputs.tag_name }}" --json body --jq .body > release-notes.md

      - name: Generate latest.json
        env:
          ARTIFACTS_DIR: release-artifacts
          OUTPUT_PATH: latest.json
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_BODY_FILE: release-notes.md
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag_name }}
        run: node scripts/generate-tauri-latest-json.mjs

      - name: Upload latest.json to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ needs.resolve-release.outputs.tag_name }}" latest.json --clobber

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release edit "${{ needs.resolve-release.outputs.tag_name }}" --draft=false