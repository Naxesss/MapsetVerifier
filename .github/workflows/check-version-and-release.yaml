name: Check Version & Release

on:
  push:
    branches:
      - '**'

jobs:
  # Build and test job - runs on every commit to validate code
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Build .NET solution
        run: dotnet build MapsetVerifier.sln -c Release
      - name: Run .NET solution tests
        run: dotnet test MapsetVerifier.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  # Build distributable installers - only on main or develop branches
  build-tauri:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_runtime: win-x64
            artifact_ext: exe
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_runtime: linux-x64
            artifact_ext: AppImage
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar_runtime: osx-x64
            arch: x64
            artifact_ext: zip
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_runtime: osx-arm64
            arch: arm64
            artifact_ext: zip
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build sidecar
        shell: bash
        run: |
          chmod +x build-sidecars.sh
          RUNTIMES="${{ matrix.sidecar_runtime }}" ./build-sidecars.sh

      - name: Install Tauri dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: --target ${{ matrix.target }}

      - name: Package macOS artifact
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          cd tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos
          zip -r "../../mapset-verifier-macos-${{ matrix.arch }}.zip" "Mapset Verifier.app"

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mapset-verifier-macos-${{ matrix.arch }}
          path: tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/mapset-verifier-macos-${{ matrix.arch }}.zip

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mapset-verifier-windows
          path: tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: mapset-verifier-linux
          path: tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

