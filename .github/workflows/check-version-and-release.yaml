name: Check Version & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release (only honored on main)'
        required: true
        default: 'false'

jobs:
  # Build and test job - runs on every commit to validate code
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Build .NET solution
        run: dotnet build MapsetVerifier.sln -c Release
      - name: Run .NET solution tests
        run: dotnet test MapsetVerifier.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  # Build distributable installers - only on main or develop branches
  build-tauri:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_runtime: win-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_runtime: linux-x64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            sidecar_runtime: linux-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar_runtime: osx-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_runtime: osx-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cross-compilation tools for Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: cmd
        run: |
          set RUNTIMES=${{ matrix.sidecar_runtime }}
          call build-sidecars.bat

      - name: Build sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          chmod +x build-sidecars.sh
          RUNTIMES="${{ matrix.sidecar_runtime }}" ./build-sidecars.sh

      - name: Install Tauri app npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: --target ${{ matrix.target }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      before_version: ${{ steps.check-version.outputs.before_version }}
      after_version: ${{ steps.check-version.outputs.after_version }}
      version_changed: ${{ steps.check-version.outputs.version_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Get current and previous versions
        id: check-version
        run: |
          git fetch origin ${{ github.event.before }} ${{ github.event.after }}
          BEFORE_VERSION=$(git show ${{ github.event.before }}:app/package.json | jq -r '.version' || echo "unknown")
          AFTER_VERSION=$(git show ${{ github.sha }}:app/package.json | jq -r '.version')
          echo "before_version=$BEFORE_VERSION" >> $GITHUB_OUTPUT
          echo "after_version=$AFTER_VERSION" >> $GITHUB_OUTPUT
          RESULT="equal"
          if [[ $BEFORE_VERSION != "unknown" ]]; then
            IFS='.' read -r -a AFTER_NUMBER <<< "$AFTER_VERSION"
            IFS='.' read -r -a BEFORE_NUMBER <<< "$BEFORE_VERSION"
            for i in 0 1 2; do
              if [[ ${AFTER_NUMBER[i]:-0} -gt ${BEFORE_NUMBER[i]:-0} ]]; then RESULT="greater"; break
              elif [[ ${AFTER_NUMBER[i]:-0} -lt ${BEFORE_NUMBER[i]:-0} ]]; then RESULT="less"; break
              fi
            done
          fi
          if [[ $RESULT == "greater" ]]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            {
              echo "### 🏷️ Version \`$BEFORE_VERSION\` updated to \`$AFTER_VERSION\`."
              echo "*No release created automatically.*"
            } >> $GITHUB_STEP_SUMMARY
          elif [[ $RESULT == "less" ]]; then
            echo "version_changed=false" >> $GITHUB_OUTPUT
            {
              echo "### 🏷️ Version reverted from \`$BEFORE_VERSION\` to \`$AFTER_VERSION\`."
              echo "*No release created.*"
            } >> $GITHUB_STEP_SUMMARY
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            {
              echo "### 🏷️ Version unchanged (\`$AFTER_VERSION\`)."
              echo "*No release created.*"
            } >> $GITHUB_STEP_SUMMARY
          fi

  # Build and release Tauri apps for all platforms - manual trigger only
  release:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.create_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_runtime: win-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_runtime: linux-x64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            sidecar_runtime: linux-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar_runtime: osx-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_runtime: osx-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Run .NET solution tests
        run: dotnet test MapsetVerifier.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results-${{ matrix.target }}
          path: '**/TestResults/*.trx'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cross-compilation tools for Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: cmd
        run: |
          set RUNTIMES=${{ matrix.sidecar_runtime }}
          call build-sidecars.bat

      - name: Build sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          chmod +x build-sidecars.sh
          RUNTIMES="${{ matrix.sidecar_runtime }}" ./build-sidecars.sh

      - name: Install Tauri app npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: --target ${{ matrix.target }}
          tagName: v__VERSION__
          releaseName: 'Mapset Verifier v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
